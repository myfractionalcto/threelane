<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB366"/>
      <stop offset="1" stop-color="#F26A1F"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background (iOS app-icon continuous corners look) -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#g)"/>
  <!-- Three slanted white bars, rounded caps, italic lean ~12° -->
  <g fill="#ffffff" transform="translate(256 256) skewX(-12) translate(-256 -256)">
    <rect x="128" y="120" width="48" height="272" rx="24" ry="24"/>
    <rect x="232" y="120" width="48" height="272" rx="24" ry="24"/>
    <rect x="336" y="120" width="48" height="272" rx="24" ry="24"/>
  </g>
</svg>
